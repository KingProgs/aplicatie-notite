services:
  - type: web
    name: aplicatie-notite
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: EXPIRARE_TOKEN_MINUTE
        value: 30
      - key: DATABASE_PATH
        value: /tmp/notes.db
